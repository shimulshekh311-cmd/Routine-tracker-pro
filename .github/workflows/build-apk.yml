name: Build APK
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧹 Clean and Prebuild
        run: |
          rm -rf android
          npx expo prebuild --platform android --no-install

      - name: 🚀 Build APK
        run: eas build --platform android --profile production --non-interactive --local --output=app-release.apk

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app-release.apk
